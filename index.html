<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PREVISUALIZACIÓN PARA WHATSAPP Y REDES SOCIALES (Open Graph) -->
    <meta property="og:title" content="🪩 Fiesta Vaquera de Mary">
    <meta property="og:description" content="¡Te invito a mi fiesta este 5 de Abril! 🤠✨ Acompáñame a celebrar.">
    <meta property="og:image" content="https://raw.githubusercontent.com/kezelvi/invitacion_mary/main/foto%20cumplea%C3%B1era%20mary.png">
    <meta property="og:type" content="website">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="800">

    <title>🪩 Fiesta Vaquera de Mary</title>
    
    <!-- Fuentes: Cinzel para el toque elegante/western y Space Grotesk para lo moderno/futurista -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'Fastelar';
            src: url('https://raw.githubusercontent.com/kezelvi/invitacion_mary/main/FastelarDemoRegular-lx4oV.ttf') format('truetype');
        }
        
        @font-face {
            font-family: 'Runtime';
            src: url('https://raw.githubusercontent.com/kezelvi/invitacion_mary/main/RuntimeRegular-m2Odx.otf') format('opentype');
        }

        :root {
            --holo-gradient: linear-gradient(90deg, #ff8a00, #e52e71, #9d00ff, #00f0ff, #ff8a00);
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            /* Fondo de vaca actualizado */
            background-color: #000;
            background-image: url('https://github.com/kezelvi/invitacion_mary/blob/main/fondo%20vaca.png?raw=true');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Capa oscura opcional sobre todo el fondo para que no deslumbre mucho (puedes ajustar el 0.4) */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 450px;
            padding: 40px 15px;
            text-align: center;
        }

        h1 {
            font-family: 'Fastelar', serif;
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* Texto con efecto holográfico animado */
        .holo-text {
            font-family: 'Runtime', sans-serif;
            background: var(--holo-gradient);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            font-weight: 700;
            font-size: 3.5rem;
            margin-top: 5px;
            margin-bottom: 20px;
            animation: shine 4s linear infinite;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Animación de entrada de abajo hacia arriba */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Aplicar animación a todos los hijos directos del contenedor */
        .container > * {
            opacity: 0;
            animation: fadeInUp 2s ease-out forwards;
        }

        /* Ligeros retrasos para que entren en cascada (efecto más elegante) */
        .container > *:nth-child(1) { animation-delay: 0.1s; }
        .container > *:nth-child(2) { animation-delay: 0.3s; }
        .container > *:nth-child(3) { animation-delay: 0.5s; }
        .container > *:nth-child(4) { animation-delay: 0.7s; }
        .container > *:nth-child(5) { animation-delay: 0.9s; }
        .container > *:nth-child(6) { animation-delay: 1.1s; }
        .container > *:nth-child(7) { animation-delay: 1.3s; }

        /* Imágenes */
        .sombrero-img {
            width: 300px;
            max-width: 95%;
            margin-bottom: -15px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
        }

        .mary-photo {
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            margin: 10px auto;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8), 0 0 20px rgba(157, 0, 255, 0.3);
            object-fit: cover;
        }

        .icon-img {
            width: 110px;
            margin-bottom: -15px;
            margin-top: -40px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
        }

        /* Tarjetas de información oscuras con poca opacidad */
        .info-card {
            position: relative;
            /* Fondo oscuro con 75% de opacidad para dejar ver la vaca sutilmente */
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(5px); /* Efecto cristalino */
            border-radius: 20px;
            padding: 25px 20px 20px;
            margin: 40px 0;
            z-index: 1;
            /* Sombra exterior y sombras interiores (inset) para el efecto biselado y relieve */
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.8), 
                inset 2px 2px 5px rgba(255, 255, 255, 0.25), 
                inset -3px -3px 10px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .info-card::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: var(--holo-gradient);
            background-size: 200% auto;
            z-index: -1;
            opacity: 0.4;
            animation: shine 4s linear infinite;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 8px 0;
            color: #eaeaea;
        }

        .highlight {
            font-weight: bold;
            color: #ffffff;
            font-size: 1.2rem;
        }

        .extra-note {
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 1.15rem;
            padding-top: 12px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sobre-icon {
            width: 32px; /* Un poco más grande que el texto */
            height: auto;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 35px;
        }

        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Botón con fondo holográfico completo */
        .btn-confirm {
            background: var(--holo-gradient);
            background-size: 200% auto;
            color: #000000;
            animation: shine 4s linear infinite;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3);
        }

        /* Botón oscuro */
        .btn-maps {
            background: rgba(15, 15, 15, 0.9);
            color: #fff;
            position: relative;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            margin: 15px auto;
        }

        /* Botón flotante para la música */
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 12px 20px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .music-btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: 1px 1px 2px #000;
        }

        /* Destellos de fondo */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 10px #fff, 0 0 20px #00f0ff; }
        }
    </style>
</head>
<body>
    
    <!-- Filtro oscuro para que el fondo de vaca no sature la vista -->
    <div class="bg-overlay"></div>

    <div class="container">
        
        <!-- Sombrero arriba del título -->
        <img src="https://github.com/kezelvi/invitacion_mary/blob/main/Sombrero%20holografico%20png.png?raw=true" alt="Sombrero" class="sombrero-img">

        <h1>Te invito a mi fiesta</h1>
        
        <!-- Foto de la cumpleañera -->
        <img src="https://github.com/kezelvi/invitacion_mary/blob/main/foto%20cumplea%C3%B1era%20mary.png?raw=true" alt="Mary" class="mary-photo">
        
        <div class="holo-text">Mary</div>

        <!-- Sección de Fecha y Hora con el Pastel -->
        <div class="info-card">
            <img src="https://github.com/kezelvi/invitacion_mary/blob/main/pastel%20holografico.png?raw=true" alt="Pastel" class="icon-img">
            <p><span class="highlight">📅 5 de Abril</span></p>
            <p>🕔 <span class="highlight">5:00 p.m.</span></p>
            <p style="color: #a1c4fd; font-size: 1rem;">
                🎶 <strong>Grupo en vivo:</strong> 7:00 p.m.
            </p>
            
            <!-- Lluvia de sobres -->
            <p class="extra-note" style="color: #ffb84d;">
                <img src="https://github.com/kezelvi/invitacion_mary/blob/main/sobre%20holografico.png?raw=true" alt="Sobre" class="sobre-icon"> Lluvia de sobres
            </p>
        </div>

        <!-- Sección de Ubicación con el Cactus -->
        <div class="info-card">
            <img src="https://github.com/kezelvi/invitacion_mary/blob/main/cactus%20holografico.png?raw=true" alt="Cactus" class="icon-img">
            <p>📍 <span class="highlight">Quinta Los Galván</span></p>
            <p style="color: #ccc; font-size: 0.95rem;">
                Calle Dalia #916<br>
                Col. Prados del Nogalar<br>
                San Nicolás de los Garza, N.L.
            </p>

            <button class="btn-maps" onclick="window.open('https://www.google.com/maps/search/?api=1&query=Calle+Dalia+916+Quinta+Los+Galván+Prados+del+Nogalar')">
                <span>📍</span> Abrir en Google Maps
            </button>

            <!-- Traje de baño -->
            <p class="extra-note" style="color: #00f0ff;">
                🩱 ¡Recuerda traer tu traje de baño!
            </p>
        </div>

        <!-- Botones de Acción -->
        <div class="buttons-group">
            <button class="btn-confirm" onclick="enviarWhatsApp()">
                <span>🤠</span> Confirmar Asistencia
            </button>
        </div>

        <div class="footer-note">
            <span>🪩</span> Toca la pantalla para encender la música
        </div>

        <!-- Audio -->
        <audio id="bgMusic" autoplay loop>
            <source src="https://raw.githubusercontent.com/kezelvi/invitacion_mary/main/musica%20el%20vaquero.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Botón flotante para música -->
    <button id="btnMusic" class="music-btn" onclick="toggleMusic()">🎵 Reproducir Música</button>

    <script>
        // Función para enviar WhatsApp con el texto exacto codificado correctamente
        function enviarWhatsApp() {
            const numero = '528116528681';
            const mensaje = 'Ahí nos vemos en tu fiesta el 5 de abril!🤠';
            const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        // Control manual de la música
        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('btnMusic');
            if (audio.paused) {
                audio.play();
                btn.innerHTML = '⏸️ Pausar Música';
            } else {
                audio.pause();
                btn.innerHTML = '🎵 Reproducir Música';
            }
        }

        // Reproducir música al primer tap (Fallback por si falla el autoplay)
        document.body.addEventListener('click', function(e) {
            // Evitar doble acción si se dio clic en el botón de música
            if(e.target.id === 'btnMusic') return;
            
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('btnMusic');
            if (audio.paused) {
                audio.play().then(() => {
                    btn.innerHTML = '⏸️ Pausar Música';
                }).catch(e => console.log("Audio no pudo iniciar automáticamente"));
            }
        }, { once: true });

        // Crear pequeños brillos en el fondo para dar más vida
        function createSparkles() {
            const container = document.querySelector('.bg-overlay');
            for(let i = 0; i < 20; i++) {
                let sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.width = Math.random() * 3 + 'px';
                sparkle.style.height = sparkle.style.width;
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                sparkle.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(sparkle);
            }
        }
        createSparkles();
    </script>

</body>
</html>
